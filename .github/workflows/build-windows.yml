name: Build Windows Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pywebview requests beautifulsoup4
        pip install pyinstaller

    - name: Create requirements.txt
      run: |
        pip freeze > requirements.txt

    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name mrzh-lbdh main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mrzh-lbdh-windows
        path: dist/mrzh-lbdh.exe
        retention-days: 30

    - name: Upload release asset (on release only)
      if: github.event_name == 'release' && github.event.action == 'created'
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: dist/mrzh-lbdh.exe
        asset_name: mrzh-lbdh.exe
        asset_content_type: application/vnd.microsoft.portable-executable
